<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First App is Live!</title>
  <style>
    :root {
      --ground-bright: #1A3CF5;
      --ground-deep: #0B1E8F;
      --text: #FFFFFF;
      --accent: #FFD23F;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 50%, var(--ground-bright) 0%, var(--ground-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .stage {
      text-align: center;
      padding: 2rem;
    }

    .headline-top {
      display: block;
      font-size: clamp(1.5rem, 5.5vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0;
      transform: translateY(18px);
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
    }

    .headline-accent {
      display: block;
      font-size: clamp(3.5rem, 16vw, 13rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.88;
      color: var(--accent);
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      animation: lockIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lockIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .headline-top,
      .headline-accent {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <span class="headline-top">My First App</span>
    <span class="headline-accent">is Live!</span>
  </main>
</body>
</html>
